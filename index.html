<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOKUCELL — Chat</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#080b14;--s1:#0f1320;--s2:#161b2e;--s3:#1e2540;--border:#252d4a;--p:#7c3aed;--pl:#a78bfa;--pg:rgba(124,58,237,.15);--cyan:#06b6d4;--text:#e2e8f0;--muted:#64748b;--free:#10b981;--sales:#a78bfa;--repair:#3b82f6;--user-bubble:#7c3aed}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;position:relative}
#circuit-bg{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.45}
/* REGISTER */
#register-screen{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:16px;background:linear-gradient(135deg,rgba(8,11,20,.97),rgba(15,19,32,.97));overflow-y:auto}
.reg-card{background:var(--s1);border:1px solid var(--border);border-radius:22px;width:100%;max-width:460px;overflow:hidden;box-shadow:0 0 60px rgba(124,58,237,.15);margin:auto}
.reg-header{background:linear-gradient(135deg,#0f1320,#1a1040);padding:28px 28px 20px;text-align:center;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.reg-avatar{width:70px;height:70px;border-radius:50%;object-fit:cover;border:3px solid var(--p);margin:0 auto 12px;display:block;position:relative;z-index:1;box-shadow:0 0 20px rgba(124,58,237,.4)}
.reg-brand{font-size:1.2rem;font-weight:800;position:relative;z-index:1}
.reg-brand span{color:var(--pl)}
.reg-sub{font-size:.8rem;color:var(--muted);margin-top:4px;position:relative;z-index:1;line-height:1.5}
.reg-body{padding:24px}
.reg-sec-title{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:10px;margin-top:18px}
.reg-sec-title:first-child{margin-top:0}
.reg-input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:.92rem;outline:none;transition:border-color .2s;font-family:inherit}
.reg-input:focus{border-color:var(--p)}
.phone-row{display:flex;gap:8px}
.country-select{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 10px;color:var(--text);font-size:.82rem;outline:none;cursor:pointer;flex-shrink:0;width:148px;transition:border-color .2s}
.intent-grid{display:flex;flex-direction:column;gap:8px}
.intent-option input{display:none}
.intent-card{border:2px solid var(--border);border-radius:12px;padding:13px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px}
.intent-option input:checked+.intent-card{border-color:var(--p);background:var(--pg)}
.intent-icon{font-size:1.3rem;flex-shrink:0}
.intent-text{font-size:.88rem;font-weight:600}
.intent-sub{font-size:.75rem;color:var(--muted);margin-top:1px}
.legal-check{display:flex;align-items:flex-start;gap:10px;margin-top:16px;cursor:pointer}
.legal-check input{margin-top:3px;accent-color:var(--p);width:16px;height:16px}
.legal-check span{font-size:.72rem;color:var(--muted);line-height:1.4}
.btn-start{width:100%;background:linear-gradient(135deg,#7c3aed,#5b21b6);border:none;border-radius:12px;padding:15px;color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:16px;transition:all .2s}
.btn-start:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,58,237,.4)}
.reg-err{color:#ef4444;font-size:.78rem;margin-top:8px;text-align:center;min-height:18px}
/* CHAT SCREEN */
#chat-screen{display:none;flex-direction:column;height:100%;position:relative;z-index:1}
.chat-header{background:rgba(15,19,32,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;position:relative}
.ch-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--p);flex-shrink:0}
.ch-info{flex:1}
.ch-info h1{font-size:.92rem;font-weight:700}
.ch-info p{font-size:.72rem;color:var(--muted);display:flex;align-items:center;gap:4px;margin-top:1px}
.status-dot{width:7px;height:7px;background:var(--free);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-restart{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:var(--pl);font-size:1rem}
.btn-restart:hover{background:var(--p);color:#fff}
/* MESSAGES */
#chat-area{flex:1;overflow-y:auto;padding:20px 12px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.msg-row{display:flex;gap:8px;max-width:720px;width:100%;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-row.bot{align-self:flex-start}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
.msg-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;margin-top:2px;object-fit:cover;border:1.5px solid var(--p)}
.msg-av-user{width:30px;height:30px;border-radius:50%;background:var(--s3);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;margin-top:2px}
.msg-content{display:flex;flex-direction:column;gap:5px;max-width:calc(100% - 40px)}
.bubble{padding:11px 15px;border-radius:18px;font-size:.9rem;line-height:1.6}
.msg-row.bot .bubble{background:var(--s2);border:1px solid var(--border);border-top-left-radius:5px}
.msg-row.user .bubble{background:var(--user-bubble);color:#fff;border-top-right-radius:5px}
.msg-time{font-size:.68rem;color:var(--muted);padding:0 3px}
.msg-row.user .msg-time{text-align:right}
.qr-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.qr-btn{background:var(--s3);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-size:.78rem;color:var(--text);cursor:pointer;transition:all .2s;white-space:nowrap}
.qr-btn:hover{border-color:var(--p);color:var(--pl);background:var(--pg)}
/* TYPING */
.typing-row{display:flex;gap:8px;align-self:flex-start;animation:fadeUp .3s ease}
.typing-bubble{background:var(--s2);border:1px solid var(--border);border-radius:18px;border-top-left-radius:5px;padding:13px 17px;display:flex;gap:5px;align-items:center}
.dot{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
/* INPUT */
.input-wrap{background:rgba(15,19,32,.95);backdrop-filter:blur(10px);border-top:1px solid var(--border);padding:12px;display:flex;gap:9px;align-items:flex-end;flex-shrink:0}
#user-input{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--text);font-size:.9rem;outline:none;resize:none;min-height:44px;max-height:110px;font-family:inherit;transition:border-color .2s}
#user-input:focus{border-color:var(--p)}
.send-btn{background:linear-gradient(135deg,#7c3aed,#5b21b6);border:none;width:44px;height:44px;border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
/* AD */
#floating-ad{position:fixed;bottom:80px;right:16px;z-index:40;width:260px;background:linear-gradient(135deg,#1a1040,#0f1320);border:1px solid var(--p)60;border-radius:16px;padding:16px;box-shadow:0 8px 32px rgba(124,58,237,.25);animation:slideIn .5s ease 4s both}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<canvas id="circuit-bg"></canvas>

<!-- REGISTER SCREEN -->
<div id="register-screen">
  <div class="reg-card">
    <div class="reg-header">
      <img class="reg-avatar" id="reg-avatar" src="" alt="">
      <div class="reg-brand">GOKU<span>CELL</span></div>
      <div class="reg-sub" id="reg-sub-text">by Jhonatan Herrera</div>
    </div>
    <div class="reg-body">
      <div class="reg-sec-title">¿Cómo te llamas?</div>
      <input class="reg-input" id="reg-name" placeholder="Tu nombre">

      <div class="reg-sec-title">Tu WhatsApp</div>
      <div class="phone-row">
        <select class="country-select" id="reg-country">
          <option value="+57|Colombia">+57 Colombia</option>
          <option value="+52|México">+52 México</option>
          <option value="+58|Venezuela">+58 Venezuela</option>
          <option value="+54|Argentina">+54 Argentina</option>
          <option value="+51|Perú">+51 Perú</option>
          <option value="+56|Chile">+56 Chile</option>
          <option value="+593|Ecuador">+593 Ecuador</option>
          <option value="+1|EE.UU.">+1 EE.UU.</option>
        </select>
        <input class="reg-input phone-input" id="reg-phone" placeholder="Número" type="tel">
      </div>

      <div id="reg-intent-box">
        <div class="reg-sec-title">¿En qué te podemos ayudar?</div>
        <div class="intent-grid">
          <label class="intent-option"><input type="radio" name="intent" value="free"><div class="intent-card"><div class="intent-icon">🎁</div><div><div class="intent-text">Recursos gratuitos</div><div class="intent-sub">Comunidad y guías libres</div></div></div></label>
          <label class="intent-option"><input type="radio" name="intent" value="sales"><div class="intent-card"><div class="intent-icon">🚀</div><div><div class="intent-text">Capacitación completa</div><div class="intent-sub">Cursos en Expercenter</div></div></div></label>
          <label class="intent-option"><input type="radio" name="intent" value="repair"><div class="intent-card"><div class="intent-icon">🔧</div><div><div class="intent-text">Cotizar reparación</div><div class="intent-sub">Servicio técnico profesional</div></div></div></label>
        </div>
      </div>

      <label class="legal-check">
        <input type="checkbox" id="reg-terms">
        <span>Acepto recibir mensajes por WhatsApp y entiendo que mis datos serán usados solo para brindarme atención personalizada y acceso a los recursos solicitados.</span>
      </label>

      <button class="btn-start" onclick="startChat()">Iniciar consulta →</button>
      <div class="reg-err" id="reg-err"></div>
    </div>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chat-screen">
  <div class="chat-header">
    <img class="ch-avatar" id="ch-avatar" src="" alt="">
    <div class="ch-info">
      <h1>GOKUCELL</h1>
      <p><span class="status-dot"></span><span id="ch-status-text">En línea</span></p>
    </div>
    <button class="btn-restart" onclick="restartIntent()" title="Volver a elegir opción">🔄</button>
  </div>
  <div id="chat-area"></div>
  <div class="input-wrap">
    <textarea id="user-input" placeholder="Escribe tu consulta..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendMsg()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="#fff"/></svg></button>
  </div>
</div>

<div id="floating-ad" class="hidden">
  <button class="ad-close" onclick="this.parentElement.style.display='none'">×</button>
  <div style="font-size:.65rem;color:var(--pl);margin-bottom:6px;font-weight:800">💡 Expercenter</div>
  <div style="font-size:.78rem;line-height:1.5;margin-bottom:10px" id="ad-text"></div>
  <a id="ad-btn" class="ad-btn" href="#" target="_blank">¡Únete!</a>
</div>

<script>
// ── FIREBASE INIT ──
const firebaseConfig = { apiKey: "AIzaSyC_i8CM3AF38KLMVsAsh_Hmrokzk_9luNU", authDomain: "expercenter.firebaseapp.com", projectId: "expercenter", storageBucket: "expercenter.firebasestorage.app", messagingSenderId: "141103944194", appId: "1:141103944194:web:da7f28c28b3118c6044d1b" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── GLOBAL STATE ──
let userName='', userPhone='', cleanPhoneNum='', userSource='Orgánico', regMode='normal';
let botState='idle', salesStepCount=0, localMsgCount=0;
let DB = { settings:{}, autoflow:{}, labels:[], topics:[] };

// ── GET SOURCE ──
const urlParams = new URLSearchParams(window.location.search);
if(urlParams.get('src')) userSource = urlParams.get('src').toLowerCase();

// ── LOAD CONFIG (REALTIME) ──
db.collection('gkc').doc('config').onSnapshot(snap => {
  if(!snap.exists) return;
  const d = snap.data();
  DB.settings = d.settings||{}; DB.autoflow = d.autoflow||{}; DB.labels = d.labels||[]; DB.topics = d.topics||[];
  
  // UI Updates
  document.getElementById('reg-avatar').src = DB.settings.profilePhoto;
  document.getElementById('ch-avatar').src = DB.settings.profilePhoto;
  document.getElementById('reg-sub-text').textContent = DB.settings.botDescription;
  
  // Reg Mode Logic
  regMode = DB.settings.regMode || 'normal';
  if(regMode === 'hide' || regMode === 'chat') {
    document.getElementById('reg-intent-box').style.display = 'none';
  } else {
    document.getElementById('reg-intent-box').style.display = 'block';
  }

  // Ad
  if(DB.settings.adText) {
    document.getElementById('floating-ad').classList.remove('hidden');
    document.getElementById('ad-text').textContent = DB.settings.adText;
    document.getElementById('ad-btn').href = DB.settings.adUrl || '#';
  }
});

// ── HISTORY LISTENER (Listen to Admin) ──
let histUnsubscribe = null;
function listenToHistory() {
  if(!cleanPhoneNum) return;
  if(histUnsubscribe) histUnsubscribe();
  histUnsubscribe = db.collection('gkc_hist').doc(cleanPhoneNum).onSnapshot(snap => {
    if(!snap.exists) return;
    const msgs = snap.data().messages || [];
    // Only render new messages that came from the server (like Admin interventions)
    if(msgs.length > localMsgCount) {
      const newMsgs = msgs.slice(localMsgCount);
      newMsgs.forEach(m => {
        // Render if it's from bot/admin and we didn't just send it locally
        if(m.role==='bot' && m.isAdmin) {
          hideTyping();
          addMsgUI('bot', m.text, {ts: m.ts});
        }
      });
      localMsgCount = msgs.length;
    }
  });
}

async function startChat() {
  const n = document.getElementById('reg-name').value.trim();
  const p = document.getElementById('reg-phone').value.trim();
  const c = document.getElementById('reg-country').value.split('|');
  const terms = document.getElementById('reg-terms').checked;
  const intentEl = document.querySelector('input[name="intent"]:checked');
  const err = document.getElementById('reg-err');

  if(!n) return err.textContent = 'Ingresa tu nombre.';
  if(!p) return err.textContent = 'Ingresa tu número.';
  if(!terms) return err.textContent = 'Debes aceptar los términos legales para continuar.';
  
  let intentVal = 'free';
  if (regMode === 'normal') {
    if(!intentEl) return err.textContent = 'Selecciona en qué te podemos ayudar.';
    intentVal = intentEl.value;
  } else if (regMode === 'hide') {
    intentVal = 'free'; // Default hidden logic
  }

  err.textContent = '';
  userName = n; userPhone = p; cleanPhoneNum = p.replace(/\D/g,'');

  // Lead Data
  const intentText = {free:'Recursos gratuitos',sales:'Capacitación Expercenter',repair:'Cotización reparación'}[intentVal] || 'Pendiente';
  const labelObj = DB.labels.find(l=>l.flow===intentVal);
  const labelText = labelObj ? labelObj.name : 'NUEVO';

  db.collection('gkc_leads').doc(Date.now().toString(36)).set({
    name: userName, phone: userPhone, countryCode: c[0], countryName: c[1],
    source: userSource, intent: intentText, label: labelText, ts: Date.now()
  });

  // UI switch
  document.getElementById('register-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display = 'flex';
  
  // Start history tracking
  listenToHistory();

  // Determine initial bot flow
  if (regMode === 'chat') {
    showTyping();
    setTimeout(() => {
      hideTyping();
      const qrM = DB.autoflow.qrMenu && DB.autoflow.qrMenu.length ? DB.autoflow.qrMenu : ['Recursos Gratuitos','Capacitación','Reparaciones'];
      const q = `¡Hola **${userName}**! Bienvenido a GOKUCELL.\n\nPara brindarte una mejor atención, cuéntame ¿en qué te podemos ayudar hoy?`;
      addMsgUI('bot', q, {qr: qrM});
      botState = 'awaiting_intent';
    }, 800);
  } else {
    triggerWelcomeFlow(intentVal);
  }
}

function triggerWelcomeFlow(intent) {
  botState = intent === 'sales' ? 'sales_q1' : 'free_chat';
  const lbl = DB.labels.find(l=>l.flow===intent);
  const msg = (lbl?.welcome || `¡Hola [nombre]! Estamos para ayudarte.`).replace(/\[nombre\]/gi, userName);
  showTyping();
  setTimeout(() => {
    hideTyping();
    const qr = intent==='sales' ? DB.autoflow.qrSales : DB.autoflow.qrFree;
    addMsgUI('bot', msg, {qr: qr||[]});
  }, 1000);
}

// ── RESTART MENU (C2) ──
function restartIntent() {
  showTyping();
  botState = 'awaiting_intent';
  setTimeout(() => {
    hideTyping();
    const qrM = DB.autoflow.qrMenu && DB.autoflow.qrMenu.length ? DB.autoflow.qrMenu : ['Quiero info del curso','Recursos Gratuitos','Cotizar reparación'];
    addMsgUI('bot', `¡Claro que sí **${userName}**! Empecemos de nuevo. ¿Qué tema te interesa revisar ahora?`, {qr: qrM});
  }, 600);
}

// ── MESSAGE ENGINE ──
function botReply(userText) {
  showTyping();
  setTimeout(() => {
    hideTyping();

    // 1. If we are waiting for intent (regMode=chat or restarted)
    if (botState === 'awaiting_intent') {
      const t = userText.toLowerCase();
      if (t.includes('curso') || t.includes('capacitaci')) return triggerWelcomeFlow('sales');
      if (t.includes('repara') || t.includes('cotiz')) return triggerWelcomeFlow('repair');
      return triggerWelcomeFlow('free'); // default
    }

    // 2. Normal Sales Flow
    if (botState === 'sales_q1' || botState === 'sales_follow') {
      salesStepCount++;
      const s = DB.autoflow;
      if (salesStepCount === 1) {
        addMsgUI('bot', (s.sb1?s.sb1+'\n\n':'') + (s.sq2||'¿Qué nivel tienes?'), {qr: s.qrSales||[]});
      } else if (salesStepCount === 2) {
        addMsgUI('bot', (s.sb2?s.sb2+'\n\n':'') + (s.sq3||'¿Qué falla buscas resolver?'), {qr: s.qrSales||[]});
      } else {
        addMsgUI('bot', s.sfinal||'Expercenter es perfecto para ti.', {qr: s.qrReturn||[]});
        botState = 'sales_closed'; salesStepCount = 0;
      }
      return;
    }

    // 3. Keyword Matcher
    const t = userText.toLowerCase();
    let best=null, max=0;
    for (let tp of DB.topics) {
      for (let k of tp.keywords||[]) { if(t.includes(k) && k.length>max) {max=k.length; best=tp;} }
    }

    if (best) {
      botState = best.type==='sales' ? 'sales_follow' : 'free_chat';
      addMsgUI('bot', (best.response||'').replace(/\[nombre\]/gi, userName), {qr: DB.autoflow.qrReturn||[]});
    } else {
      addMsgUI('bot', `No te entendí muy bien **${userName}**. Intenta ser más específico o elige una opción 👇`, {qr: DB.autoflow.qrMenu||['Recursos','Cursos']});
    }
  }, 1000 + Math.random()*500);
}

// ── UI LOGIC ──
function addMsgUI(role, text, extras={}) {
  localMsgCount++; // increment local counter
  const area = document.getElementById('chat-area');
  const row = document.createElement('div'); row.className = `msg-row ${role}`;
  row.innerHTML = `<img class="msg-av" src="${DB.settings.profilePhoto}" style="display:${role==='bot'?'block':'none'}">
  <div class="msg-av-user" style="display:${role==='user'?'flex':'none'}">${userName?userName[0]:'U'}</div>
  <div class="msg-content">
    <div class="bubble">${esc(text).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</div>
    <div class="qr-wrap" id="qr-${localMsgCount}"></div>
    <div class="msg-time">${new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'})}</div>
  </div>`;
  area.appendChild(row);

  if (extras.qr && extras.qr.length && role==='bot') {
    const qrw = row.querySelector('.qr-wrap');
    extras.qr.forEach(q => {
      const btn = document.createElement('button'); btn.className='qr-btn'; btn.textContent=q;
      btn.onclick = () => { addMsgUI('user',q); botReply(q); };
      qrw.appendChild(btn);
    });
  }

  area.scrollTop = area.scrollHeight;

  // Save to Firebase
  if(!extras.ts) { // don't re-save if it came from firebase listener
    const histRef = db.collection('gkc_hist').doc(cleanPhoneNum);
    histRef.get().then(snap => {
      const msgs = snap.exists ? snap.data().messages : [];
      msgs.push({role, text, ts: Date.now()});
      histRef.set({messages: msgs, phone: userPhone, updatedAt: Date.now()});
    });
  }
}

function showTyping() {
  const row = document.createElement('div'); row.className='typing-row'; row.id='typing-ind';
  row.innerHTML = `<img class="msg-av" src="${DB.settings.profilePhoto}"><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  document.getElementById('chat-area').appendChild(row); document.getElementById('chat-area').scrollTop = 9999;
}
function hideTyping() { const t=document.getElementById('typing-ind'); if(t)t.remove(); }
function sendMsg() { const i=document.getElementById('user-input'); const v=i.value.trim(); if(!v)return; addMsgUI('user',v); i.value=''; i.style.height='auto'; botReply(v); }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey) {e.preventDefault(); sendMsg();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }
</script>
